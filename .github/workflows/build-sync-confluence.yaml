name: Build sync_confluence

on:
  push:
    tags:
      - "sync-confluence-v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e ./sync_confluence

    - name: Run tests
      run: |
        cd sync_confluence
        pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: |
        cd sync_confluence
        python -m build

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        files: ./sync_confluence/dist/*
