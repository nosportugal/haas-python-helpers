name: Pre-commit Checks
run-name: Run pre-commit hooks on pull request ${{ github.event.pull_request.number }}

on:
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute changed files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA")
          all_files=$(echo "$changed" | tr '\n' ' ')
          echo "all=${all_files}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pre-commit hooks
        if: steps.changed.outputs.all != ''
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --files ${{ steps.changed.outputs.all }}
